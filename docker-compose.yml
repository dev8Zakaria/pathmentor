services:
  mongodb:
    image: mongo:7
    container_name: pathmentor-mongodb
    command: ["mongod", "--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 60s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express:1.0.2
    container_name: pathmentor-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pathmentor
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pathmentor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: pathmentor-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/pathmentor_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p pathmentor_password 'RETURN 1' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

  seed:
    image: node:22-alpine
    container_name: pathmentor-seed
    working_dir: /app
    command: ["sh", "-c", "npm install --include=dev && npm run build --workspace backend && npm run seed --workspace backend"]
    environment:
      MONGO_URI: mongodb://mongodb:27017/pathmentor
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: pathmentor_password
      RESET_DATABASE: "false"
    volumes:
      - .:/app
      - root-node-modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  backend:
    image: node:22-alpine
    container_name: pathmentor-backend
    working_dir: /app
    command: ["sh", "-c", "npm run build --workspace backend && npm run start --workspace backend"]
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/pathmentor
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: pathmentor_password
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      FRONTEND_URL: http://localhost:5173
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
    volumes:
      - .:/app
      - root-node-modules:/app/node_modules
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: pathmentor-frontend
    working_dir: /app
    command: ["sh", "-c", "npm run build --workspace frontend && npm run serve --workspace frontend"]
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
    volumes:
      - .:/app
      - root-node-modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
  neo4j-data:
  neo4j-logs:
  root-node-modules:
